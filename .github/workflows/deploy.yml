name: Build and Deploy

on:
  push:
    branches:
      - main   # runs when you push to main
  pull_request:
    branches:
      - main   # runs on PR to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build